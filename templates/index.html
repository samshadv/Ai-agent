<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 760px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 16px;
      border-bottom: 1px solid #ffffff18;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .header-sub {
      font-size: 12px;
      color: #888;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #4ade80;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Chat box */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .welcome h2 {
      font-size: 22px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .welcome p { font-size: 14px; }

    /* Messages */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .avatar.bot {
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      color: #fff;
    }

    .avatar.user {
      background: #2a2a3e;
      color: #aaa;
    }

    .bubble {
      max-width: 72%;
      padding: 11px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
    }

    .bubble.bot {
      background: #1e1e2e;
      border: 1px solid #ffffff10;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .timestamp {
      font-size: 10px;
      color: #444;
      margin-top: 4px;
      padding: 0 8px;
    }

    .msg-row.user .timestamp { text-align: right; }

    /* Typing indicator */
    .typing-bubble {
      background: #1e1e2e;
      border: 1px solid #ffffff10;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
      border-radius: 16px;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6c63ff;
      animation: bounce 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding-top: 14px;
      border-top: 1px solid #ffffff10;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #ffffff18;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      color: #f0f0f0;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
      line-height: 1.5;
      transition: border 0.2s;
    }

    textarea:focus { border-color: #6c63ff88; }
    textarea::placeholder { color: #555; }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.88; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .footer-hint {
      font-size: 11px;
      color: #444;
      text-align: center;
      margin-top: 10px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 11px;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .clear-btn:hover { color: #888; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">😎</div>
      <div>
        <div class="header-title">AI Agent</div>
        <div class="header-sub">Sunstone</div>
      </div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <!-- Chat messages -->
  <div id="chat-box">
    <div class="welcome" id="welcome-msg">
      <h2>Hello! 👋</h2>
      <p>Ask me anything — I'm here to help with data science,<br>coding, or any question you have.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="Type your message..."
        rows="1"
        onInput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="footer-hint">
      Press Enter to send &nbsp;·&nbsp;
      <button class="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>
  </div>

</div>

<script>
  const chatBox = document.getElementById("chat-box");
  const input = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function addMessage(text, role) {
    const welcome = document.getElementById("welcome-msg");
    if (welcome) welcome.remove();

    const row = document.createElement("div");
    row.className = "msg-row " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar " + role;
    avatar.textContent = role === "bot" ? "AI" : "You";

    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    bubble.textContent = text;

    const ts = document.createElement("div");
    ts.className = "timestamp";
    ts.textContent = getTime();

    const msgWrap = document.createElement("div");
    msgWrap.style.display = "flex";
    msgWrap.style.flexDirection = "column";
    msgWrap.appendChild(bubble);
    msgWrap.appendChild(ts);

    row.appendChild(avatar);
    row.appendChild(msgWrap);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-indicator";

    const avatar = document.createElement("div");
    avatar.className = "avatar bot";
    avatar.textContent = "AI";

    const typing = document.createElement("div");
    typing.className = "typing-bubble";
    typing.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(avatar);
    row.appendChild(typing);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const indicator = document.getElementById("typing-indicator");
    if (indicator) indicator.remove();
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      removeTyping();
      if (data.reply) {
        addMessage(data.reply, "bot");
      } else {
        addMessage("Something went wrong. Please try again.", "bot");
      }
    } catch (err) {
      removeTyping();
      addMessage("Connection error. Is the server running?", "bot");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function clearChat() {
    await fetch("/clear", { method: "POST" });
    chatBox.innerHTML = `
      <div class="welcome" id="welcome-msg">
        <h2>Hello! 👋</h2>
        <p>Ask me anything — I'm here to help with data science,<br>coding, or any question you have.</p>
      </div>`;
  }

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
