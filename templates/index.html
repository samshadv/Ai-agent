<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusAI — Intelligence Redefined</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080810;
      --bg2: #0d0d1a;
      --bg3: #111122;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f8;
      --muted: #8888aa;
      --accent: #7c6cff;
      --accent2: #3ecfcf;
      --accent3: #ff6c8a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 60px;
      background: rgba(8,8,16,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px;
      color: var(--text); text-decoration: none; letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-ctas { display: flex; gap: 12px; align-items: center; }
    .btn-ghost {
      padding: 9px 20px; border: 1px solid var(--border2); border-radius: 8px;
      background: transparent; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary {
      padding: 9px 22px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #5a4de0); color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s; text-decoration: none;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 140px 40px 80px; position: relative; overflow: hidden;
    }
    .hero-glow {
      position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(124,108,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(48px, 7vw, 88px);
      font-weight: 800; line-height: 1.05; letter-spacing: -3px;
      margin-bottom: 28px; animation: fadeUp 0.8s 0.1s ease both;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero p {
      font-size: 18px; color: var(--muted); max-width: 540px; line-height: 1.7;
      margin-bottom: 44px; font-weight: 300; animation: fadeUp 0.8s 0.2s ease both;
    }
    .hero-ctas { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; animation: fadeUp 0.8s 0.3s ease both; }
    .btn-hero {
      padding: 14px 32px; border-radius: 10px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-hero-primary {
      background: linear-gradient(135deg, var(--accent), #5a4de0); color: #fff; border: none;
      box-shadow: 0 0 40px rgba(124,108,255,0.3);
    }
    .btn-hero-primary:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(124,108,255,0.4); }
    .btn-hero-ghost { background: transparent; color: var(--text); border: 1px solid var(--border2); }
    .btn-hero-ghost:hover { border-color: var(--accent); background: rgba(124,108,255,0.05); }
    .marquee-section { padding: 40px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); overflow: hidden; }
    .marquee-label { text-align: center; font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
    .marquee-track { display: flex; gap: 60px; animation: marquee 20s linear infinite; white-space: nowrap; }
    .marquee-item { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.15); flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
    .marquee-item::before { content: '✦'; color: rgba(124,108,255,0.3); font-size: 10px; }
    @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    section { padding: 100px 60px; position: relative; }
    .section-tag { display: inline-block; font-size: 11px; font-weight: 500; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .section-title { font-family: 'Syne', sans-serif; font-size: clamp(32px, 4vw, 52px); font-weight: 700; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px; }
    .section-sub { font-size: 16px; color: var(--muted); max-width: 480px; line-height: 1.7; font-weight: 300; }
    .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-top: 60px; }
    .feature-card { background: var(--bg2); padding: 40px 36px; transition: background 0.3s; }
    .feature-card:hover { background: var(--bg3); }
    .feature-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 20px; }
    .icon-purple { background: rgba(124,108,255,0.12); }
    .icon-teal { background: rgba(62,207,207,0.12); }
    .icon-pink { background: rgba(255,108,138,0.12); }
    .feature-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.3px; }
    .feature-desc { font-size: 14px; color: var(--muted); line-height: 1.7; font-weight: 300; }
    .demo-section { background: var(--bg2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .demo-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .chat-demo-window { background: var(--bg); border: 1px solid var(--border2); border-radius: 16px; overflow: hidden; }
    .chat-demo-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg3); }
    .chat-demo-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .chat-demo-name { font-size: 13px; font-weight: 500; }
    .chat-demo-status { font-size: 11px; color: #4ade80; display: flex; align-items: center; gap: 4px; }
    .chat-demo-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 14px; }
    .demo-msg { display: flex; gap: 10px; align-items: flex-end; }
    .demo-msg.user { flex-direction: row-reverse; }
    .demo-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: 75%; }
    .demo-bubble.bot { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 3px; }
    .demo-bubble.user { background: linear-gradient(135deg, var(--accent), #5a4de0); color: #fff; border-bottom-right-radius: 3px; }
    .demo-input-bar { margin: 0 20px 20px; border: 1px solid var(--border2); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; background: var(--bg3); }
    .demo-input-text { flex: 1; font-size: 13px; color: var(--muted); }
    .demo-send { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), #5a4de0); display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .stats-section { text-align: center; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-top: 60px; }
    .stat-card { background: var(--bg2); padding: 50px 40px; text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 54px; font-weight: 800; letter-spacing: -3px; background: linear-gradient(135deg, var(--text), var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 12px; }
    .stat-label { font-size: 14px; color: var(--muted); font-weight: 300; }
    .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; margin-top: 60px; }
    .step-num-big { font-family: 'Syne', sans-serif; font-size: 64px; font-weight: 800; color: rgba(255,255,255,0.04); line-height: 1; margin-bottom: -10px; }
    .step-line { width: 32px; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); margin-bottom: 16px; }
    .step-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .step-desc { font-size: 13px; color: var(--muted); line-height: 1.7; font-weight: 300; }
    .cta-section { text-align: center; padding: 100px 60px; position: relative; overflow: hidden; }
    .cta-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 300px; background: radial-gradient(ellipse, rgba(124,108,255,0.1) 0%, transparent 70%); pointer-events: none; }
    .cta-section h2 { font-family: 'Syne', sans-serif; font-size: clamp(36px, 5vw, 64px); font-weight: 800; letter-spacing: -2px; margin-bottom: 20px; }
    .cta-section p { font-size: 16px; color: var(--muted); margin-bottom: 40px; font-weight: 300; }
    footer { border-top: 1px solid var(--border); padding: 60px 60px 40px; }
    .footer-top { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 60px; margin-bottom: 60px; }
    .footer-brand p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-top: 14px; font-weight: 300; max-width: 240px; }
    .footer-col h4 { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
    .footer-col ul { list-style: none; }
    .footer-col ul li { margin-bottom: 10px; }
    .footer-col ul li a { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; font-weight: 300; }
    .footer-col ul li a:hover { color: var(--text); }
    .footer-bottom { border-top: 1px solid var(--border); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; }
    .footer-bottom p { font-size: 12px; color: var(--muted); font-weight: 300; }
    .footer-socials { display: flex; gap: 16px; }
    .footer-socials a { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-socials a:hover { color: var(--text); }
    .chat-page { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; flex-direction: column; }
    .chat-page.open { display: flex; }
    .chat-nav { padding: 16px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(8,8,16,0.9); backdrop-filter: blur(20px); }
    .chat-back { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; transition: color 0.2s; background: none; border: none; font-family: 'DM Sans', sans-serif; }
    .chat-back:hover { color: var(--text); }
    .chat-body { flex: 1; overflow-y: auto; padding: 40px; max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    .chat-welcome { text-align: center; padding: 60px 20px; }
    .chat-welcome h2 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -1px; margin-bottom: 10px; }
    .chat-welcome p { font-size: 15px; color: var(--muted); font-weight: 300; }
    .msg-row { display: flex; gap: 12px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
    .msg-avatar.bot { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .msg-avatar.user { background: var(--bg3); border: 1px solid var(--border2); color: var(--muted); }
    .msg-bubble { max-width: 68%; padding: 12px 18px; border-radius: 16px; font-size: 14px; line-height: 1.7; }
    .msg-bubble.bot { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-bubble.user { background: linear-gradient(135deg, var(--accent), #5a4de0); color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 5px; padding: 0 8px; }
    .msg-row.user .msg-time { text-align: right; }
    .typing { display: flex; align-items: center; gap: 5px; padding: 14px 18px; background: var(--bg3); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.3} 40%{transform:translateY(-6px);opacity:1} }
    .chat-input-area { padding: 20px 40px 30px; max-width: 800px; width: 100%; margin: 0 auto; }
    .chat-input-box { display: flex; gap: 12px; align-items: flex-end; background: var(--bg3); border: 1px solid var(--border2); border-radius: 14px; padding: 14px 18px; transition: border-color 0.2s; }
    .chat-input-box:focus-within { border-color: rgba(124,108,255,0.4); }
    .chat-input-box textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; min-height: 24px; max-height: 120px; line-height: 1.6; }
    .chat-input-box textarea::placeholder { color: var(--muted); }
    .chat-send { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), #5a4de0); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
    .chat-send:disabled { opacity: 0.3; cursor: not-allowed; }
    .chat-send:hover:not(:disabled) { opacity: 0.85; }
    .chat-send svg { width: 16px; height: 16px; fill: #fff; }
    .chat-hint { text-align: center; font-size: 11px; color: rgba(255,255,255,0.15); margin-top: 10px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @media(max-width:900px){
      nav{padding:16px 24px}
      .nav-links{display:none}
      section{padding:70px 24px}
      .features-grid,.stats-grid{grid-template-columns:1fr}
      .steps{grid-template-columns:1fr 1fr}
      .demo-layout{grid-template-columns:1fr}
      .footer-top{grid-template-columns:1fr 1fr}
      .cta-section{padding:80px 24px}
      footer{padding:50px 24px 30px}
    }
