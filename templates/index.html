<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusAI — Intelligence Redefined</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <style>
    :root {
      --bg: #080810;
      --bg2: #0d0d1a;
      --bg3: #111122;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f8;
      --muted: #8888aa;
      --accent: #7c6cff;
      --accent2: #3ecfcf;
      --accent3: #ff6c8a;
    }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { 
      font-family: 'DM Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      overflow-x: hidden; 
    }
        nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 60px;
      background: rgba(8,8,16,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px;
      color: var(--text); text-decoration: none; letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
